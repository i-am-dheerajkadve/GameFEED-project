---

- name: Prepare all nodes  for RKE2 installation
  hosts: all_nodes
  become: yes

  tasks:
    - name: update packages
      apt:
        update_cache: yes

    - name: install require package
      apt:
        name:
          - curl
          - vim
          - net-tools
        state: present
    - name: disable swaps
      command: swapoff -a
      changed_when: false

    - name: disable swaps change permanently
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

    - name: confifure module
      copy:
        dest: /etc/modules-load.d/rke2.conf
        content: |
          overlay
          br_netfilter
        owner: root
        group: root
        mode: '0644'

    - name: Configure sysctl settings for RKE2
      copy:
        dest: /etc/sysctl.d/99-rke2.conf
        content: |
          net.bridge.bridge-nf-call-iptables=1
          net.bridge.bridge-nf-call-ip6tables=1
          net.ipv4.ip_forward=1
        owner: root
        group: root
        mode: '0644'

    - name: Apply sysctl settings
      command: sysctl --system
      changed_when: false
