{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gamefeed-ingress.resourceName" . }}
  namespace: {{ include "gamefeed-ingress.namespace" . }}
  labels:
    {{- include "gamefeed-ingress.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{ end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{ end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          {{ range .Values.ingress.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ .serviceName }}
                port:
                  number: {{ .servicePort }}
          {{ end }}
{{- end }}
