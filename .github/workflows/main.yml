name: GameFEED Docker Build and Push

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gamefeed-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            context: ./user-service
            image: gamefeed-user-service
          - service: game-service
            context: ./game-service
            image: gamefeed-game-service
          - service: review-service
            context: ./review-service
            image: gamefeed-review-service
          - service: comment-service
            context: ./comment-service
            image: gamefeed-comment-service
          - service: api-gateway
            context: ./api-gateway
            image: gamefeed-api-gateway
          - service: frontend
            context: ./frontend
            image: gamefeed-frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
