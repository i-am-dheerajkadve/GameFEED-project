---
- name: Install and configure RKE2 master/server node
  hosts: control
  become: yes

  vars:
    rke2_token: "my-rke2-secret-token"
    rke2_tls_san:
      - "40.81.233.225"

  tasks:
    - name: Create RKE2 config directory
      file:
        path: /etc/rancher/rke2
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Create RKE2 server config file
      copy:
        dest: /etc/rancher/rke2/config.yaml
        owner: root
        group: root
        mode: '0644'
        content: |
          token: "{{ rke2_token }}"
          write-kubeconfig-mode: "0644"
          tls-san:
          {% for ip in rke2_tls_san %}
            - {{ ip }}
          {% endfor %}

    - name: Install RKE2 server
      shell: curl -sfL https://get.rke2.io | sh -
      args:
        creates: /usr/local/bin/rke2

    - name: Enable RKE2 server service
      systemd:
        name: rke2-server.service
        enabled: yes

    - name: Start RKE2 server service
      systemd:
        name: rke2-server.service
        state: started

    - name: Wait for kubeconfig file to be created
      wait_for:
        path: /etc/rancher/rke2/rke2.yaml
        timeout: 300

    - name: Show RKE2 server service status
      command: systemctl status rke2-server.service --no-pager
      register: rke2_status
      changed_when: false
      failed_when: false

    - name: Print RKE2 server status
      debug:
        var: rke2_status.stdout_lines
