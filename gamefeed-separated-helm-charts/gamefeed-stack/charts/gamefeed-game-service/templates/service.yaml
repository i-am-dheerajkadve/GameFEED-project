apiVersion: v1
kind: Service
metadata:
  name: {{ include "gamefeed-game-service.resourceName" . }}
  namespace: {{ include "gamefeed-game-service.namespace" . }}
  labels:
    app: {{ include "gamefeed-game-service.resourceName" . }}
    {{- include "gamefeed-game-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "gamefeed-game-service.resourceName" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.containerPort }}
      {{ if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{ end }}
